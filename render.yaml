services:
  - type: web
    name: inventory-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard → your Supabase connection string
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL after deployment
      - key: PYTHON_VERSION
        value: 3.12.0
